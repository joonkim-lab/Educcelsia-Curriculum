<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOS 커리큘럼</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f5f5f5; color: #1a1a1a; }
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
.login-card { background:#fff; border-radius:16px; padding:3rem 2.5rem; max-width:420px; width:100%; text-align:center; border:1px solid #e0e0e0; }
.login-logo { font-size:2.5rem; font-weight:700; color:#c0392b; margin-bottom:0.5rem; }
.login-sub { font-size:0.9rem; color:#888; margin-bottom:2rem; }
.btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:0.9rem; border:1px solid #ddd; border-radius:8px; background:#fff; font-size:0.95rem; cursor:pointer; }
.btn-google:hover { background:#f5f5f5; }
#api-screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
.api-card { background:#fff; border-radius:16px; padding:2.5rem; max-width:480px; width:100%; border:1px solid #e0e0e0; }
.api-card h2 { font-size:1.2rem; margin-bottom:0.5rem; }
.api-card p { font-size:0.85rem; color:#888; margin-bottom:1.5rem; line-height:1.6; }
.api-input { width:100%; padding:0.8rem 1rem; border:1px solid #ddd; border-radius:8px; font-size:0.9rem; margin-bottom:1rem; }
.btn-primary { width:100%; padding:0.9rem; background:#c0392b; color:#fff; border:none; border-radius:8px; font-size:0.95rem; cursor:pointer; font-weight:600; }
.btn-primary:hover { background:#a93226; }
#app-screen { display:none; }
.topbar { background:#1a1a1a; color:#fff; padding:0.9rem 1.5rem; display:flex; align-items:center; gap:12px; }
.topbar-title { font-size:1rem; font-weight:600; }
.topbar-badge { font-size:0.75rem; padding:3px 10px; border-radius:20px; background:#c0392b; color:#fff; }
.topbar-user { margin-left:auto; font-size:0.8rem; color:#aaa; }
.btn-logout { background:transparent; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:6px; font-size:0.75rem; cursor:pointer; }
.btn-logout:hover { border-color:#888; color:#fff; }
.main-layout { display:flex; min-height:calc(100vh - 50px); }
.sidebar { width:220px; background:#fff; border-right:1px solid #e0e0e0; padding:1rem 0; flex-shrink:0; }
.sb-section { font-size:0.7rem; color:#aaa; padding:0.8rem 1.2rem 0.4rem; text-transform:uppercase; letter-spacing:.05em; }
.sb-item { display:flex; align-items:center; gap:8px; padding:0.6rem 1.2rem; font-size:0.85rem; color:#555; cursor:pointer; }
.sb-item:hover { background:#f5f5f5; }
.sb-item.active { background:#fdecea; color:#c0392b; font-weight:600; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-red { background:#c0392b; } .dot-blue { background:#1a6fab; } .dot-gray { background:#ccc; }
.content { flex:1; padding:1.5rem; overflow-y:auto; }
.content h2 { font-size:1.3rem; font-weight:600; margin-bottom:0.3rem; }
.content .sub { font-size:0.85rem; color:#888; margin-bottom:1.5rem; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.5rem; }
.stat-card { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:1rem 1.2rem; text-align:center; }
.stat-num { font-size:1.8rem; font-weight:600; }
.stat-lbl { font-size:0.75rem; color:#888; margin-top:4px; }
.week-list { display:flex; flex-direction:column; gap:8px; }
.week-card { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:1rem 1.2rem; display:flex; align-items:center; gap:12px; cursor:pointer; transition:border-color .2s; }
.week-card:hover { border-color:#c0392b; }
.week-card.active-week { border-color:#c0392b; border-width:2px; }
.week-card.done { opacity:.7; }
.wnum { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:600; flex-shrink:0; }
.wnum-done { background:#eaf3de; color:#27500a; }
.wnum-active { background:#fdecea; color:#c0392b; }
.wnum-lock { background:#f5f5f5; color:#aaa; }
.winfo { flex:1; }
.wtitle { font-size:0.9rem; font-weight:500; margin-bottom:3px; }
.wmeta { font-size:0.75rem; color:#888; }
.wbadge { font-size:0.72rem; padding:3px 8px; border-radius:20px; flex-shrink:0; }
.b-done { background:#eaf3de; color:#27500a; }
.b-active { background:#fdecea; color:#c0392b; }
.b-lock { background:#f5f5f5; color:#aaa; }

/* ── 과제 화면 ── */
#task-screen { display:none; }
.task-header { background:#fff; border-bottom:1px solid #e0e0e0; padding:1rem 1.5rem; display:flex; align-items:center; gap:12px; }
.btn-back { background:transparent; border:1px solid #ddd; border-radius:8px; padding:6px 12px; font-size:0.85rem; cursor:pointer; }
.btn-back:hover { background:#f5f5f5; }
.task-title-bar { font-size:1rem; font-weight:600; }
.tab-bar { display:flex; border-bottom:2px solid #e0e0e0; background:#fff; padding:0 1.5rem; }
.tab-btn { padding:0.9rem 1.5rem; font-size:0.9rem; color:#888; cursor:pointer; border:none; border-bottom:3px solid transparent; background:transparent; margin-bottom:-2px; transition:color .15s; }
.tab-btn.active { color:#c0392b; border-bottom-color:#c0392b; font-weight:600; }
#article-tab { display:block; padding:2rem 1.5rem; max-width:780px; margin:0 auto; }
#task-tab { display:none; padding:1.5rem; max-width:760px; margin:0 auto; }

/* ── 아티클 가독성 스타일 ── */
.article-wrap { background:#fff; border:1px solid #e0e0e0; border-radius:16px; overflow:hidden; }
.article-hero { background:linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); padding:2rem 2.5rem; }
.article-hero-badge { font-size:0.72rem; color:#c0392b; background:rgba(192,57,43,0.2); border:1px solid rgba(192,57,43,0.4); border-radius:20px; padding:3px 10px; display:inline-block; margin-bottom:0.8rem; }
.article-hero-title { font-size:1.4rem; font-weight:700; color:#fff; line-height:1.5; margin-bottom:0.8rem; }
.article-hero-link { font-size:0.8rem; color:#888; text-decoration:none; }
.article-hero-link:hover { color:#aaa; }
.article-body-wrap { padding:2rem 2.5rem; }
.article-para { font-size:0.95rem; line-height:2; color:#222; margin-bottom:1.2rem; word-break:keep-all; }
.article-chapter { margin:2rem 0 1rem; padding:0.6rem 0 0.6rem 1rem; border-left:4px solid #c0392b; }
.article-chapter-num { font-size:0.72rem; color:#c0392b; font-weight:600; text-transform:uppercase; letter-spacing:.08em; margin-bottom:0.2rem; }
.article-chapter-title { font-size:1.05rem; font-weight:700; color:#1a1a1a; }
.article-quote { background:#fafafa; border-left:4px solid #e0e0e0; border-radius:0 8px 8px 0; padding:1rem 1.2rem; margin:1.2rem 0; }
.article-quote-text { font-size:0.9rem; line-height:1.8; color:#444; font-style:italic; }
.article-quote-source { font-size:0.78rem; color:#888; margin-top:0.5rem; }
.article-divider { border:none; border-top:1px solid #f0f0f0; margin:1.5rem 0; }
.article-summary { background:#fdecea; border-radius:12px; padding:1.2rem 1.5rem; margin-top:1.5rem; }
.article-summary-title { font-size:0.8rem; font-weight:600; color:#c0392b; margin-bottom:0.6rem; }
.article-summary li { font-size:0.88rem; color:#444; line-height:1.7; margin-left:1rem; }

/* ── 과제 탭 ── */
.q-section { margin-bottom:2rem; }
.q-section-title { font-size:0.8rem; color:#888; text-transform:uppercase; letter-spacing:.05em; margin-bottom:1rem; padding-bottom:.5rem; border-bottom:1px solid #e0e0e0; }
.q-box { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:1.2rem; margin-bottom:1rem; }
.q-label { font-size:0.75rem; font-weight:600; color:#c0392b; margin-bottom:.4rem; }
.q-text { font-size:0.9rem; margin-bottom:.8rem; line-height:1.6; }
.q-textarea { width:100%; border:1px solid #e0e0e0; border-radius:8px; padding:.8rem; font-size:0.88rem; font-family:inherit; resize:vertical; min-height:100px; line-height:1.6; }
.q-textarea:focus { outline:none; border-color:#c0392b; }
.submit-area { text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid #e0e0e0; }
.btn-submit { background:#c0392b; color:#fff; border:none; border-radius:10px; padding:.9rem 3rem; font-size:1rem; font-weight:600; cursor:pointer; }
.btn-submit:hover { background:#a93226; }
.btn-submit:disabled { background:#ccc; cursor:not-allowed; }
.result-box { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; }
.result-title { font-size:1rem; font-weight:600; margin-bottom:1rem; }
.score-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:1.2rem; }
.score-card { background:#f5f5f5; border-radius:10px; padding:.8rem; text-align:center; }
.score-num { font-size:1.5rem; font-weight:600; }
.score-lbl { font-size:.72rem; color:#888; margin-top:2px; }
.fb-item { border-left:3px solid #e0e0e0; padding:.8rem 1rem; margin-bottom:.8rem; }
.fb-good { border-color:#27500a; } .fb-avg { border-color:#854f0b; } .fb-poor { border-color:#c0392b; }
.fb-q { font-size:.75rem; font-weight:600; color:#888; margin-bottom:.3rem; }
.fb-score { font-size:.8rem; font-weight:600; margin-bottom:.4rem; }
.fb-text { font-size:.85rem; color:#444; line-height:1.6; }
.loading { text-align:center; padding:2rem; color:#888; font-size:.9rem; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid #e0e0e0; border-top-color:#c0392b; border-radius:50%; animation:spin .8s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
.teacher-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem; }
.student-table { background:#fff; border:1px solid #e0e0e0; border-radius:12px; overflow:hidden; }
.student-table table { width:100%; border-collapse:collapse; font-size:.85rem; }
.student-table th { background:#1a1a1a; color:#fff; padding:.7rem 1rem; text-align:left; font-weight:500; }
.student-table td { padding:.7rem 1rem; border-bottom:1px solid #f0f0f0; }
.student-table tr:last-child td { border-bottom:none; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">EOS</div>
    <div class="login-sub">Educcelsia 커리큘럼 플랫폼</div>
    <p style="font-size:.85rem;color:#555;margin-bottom:1.5rem;line-height:1.6">구글 계정으로 로그인하면<br>커리큘럼과 과제에 바로 접근할 수 있어요.</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <img src="https://www.google.com/favicon.ico" width="20" alt="">
      Google 계정으로 로그인
    </button>
  </div>
</div>

<div id="api-screen">
  <div class="api-card">
    <h2>Anthropic API 키 설정</h2>
    <p>AI 채점 기능을 위해 API 키가 필요해요.<br>키는 이 기기에만 저장되며 외부로 전송되지 않아요.<br><br>console.anthropic.com에서 확인할 수 있어요.</p>
    <input class="api-input" type="password" id="api-key-input" placeholder="sk-ant-..." />
    <button class="btn-primary" onclick="saveApiKey()">저장하고 시작하기</button>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <span class="topbar-title">EOS 커리큘럼</span>
    <span class="topbar-badge" id="track-badge"></span>
    <span class="topbar-user" id="user-name"></span>
    <button class="btn-logout" onclick="doSignOut()">로그아웃</button>
  </div>
  <div class="main-layout">
    <div class="sidebar">
      <div class="sb-section">브랜딩</div>
      <div class="sb-item active" id="nav-branding1" onclick="switchTrack('branding1')"><div class="dot dot-red"></div>1학기</div>
      <div class="sb-item" id="nav-branding2" onclick="switchTrack('branding2')"><div class="dot dot-gray"></div>2학기</div>
      <div class="sb-section">트렌드</div>
      <div class="sb-item" id="nav-trend1" onclick="switchTrack('trend1')"><div class="dot dot-gray"></div>1학기</div>
      <div class="sb-item" id="nav-trend2" onclick="switchTrack('trend2')"><div class="dot dot-gray"></div>2학기</div>
      <div class="sb-section">관리</div>
      <div class="sb-item" id="nav-teacher" onclick="switchTrack('teacher')" style="display:none"><div class="dot dot-blue"></div>교사 현황판</div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<div id="task-screen">
  <div class="task-header">
    <button class="btn-back" onclick="showApp()">← 목록으로</button>
    <span class="task-title-bar" id="task-title"></span>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-article-btn" onclick="switchTab('article')">📖 아티클 읽기</button>
    <button class="tab-btn" id="tab-task-btn" onclick="switchTab('task')">✏️ 과제 제출</button>
  </div>
  <div id="article-tab"></div>
  <div id="task-tab"></div>
</div>

<script src="curriculum.js"></script>
<script src="articles.js"></script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCE9av8U07SSRTGFCoUnGtRX8W94M33FR0",
  authDomain: "educcelsia-curriculum.firebaseapp.com",
  projectId: "educcelsia-curriculum",
  storageBucket: "educcelsia-curriculum.firebasestorage.app",
  messagingSenderId: "438601605189",
  appId: "1:438601605189:web:c5b0fe242c2c99cc71832c"
};
const TEACHER_EMAILS = ['joonkim@educcelsia.com'];
const fbApp = initializeApp(FIREBASE_CONFIG);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);
const gProvider = new GoogleAuthProvider();

let currentUser  = null;
let currentTrack = 'branding1';
let userProgress = {};
let isTeacher    = false;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    isTeacher   = TEACHER_EMAILS.includes(user.email);
    document.getElementById('user-name').textContent = user.displayName || user.email;
    if (isTeacher) document.getElementById('nav-teacher').style.display = 'flex';
    await loadProgress();
    localStorage.getItem('eos_api_key') ? showApp() : showApiScreen();
  } else { showLogin(); }
});

window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, gProvider); }
  catch(e) { alert('로그인 실패: ' + e.message); }
};
window.doSignOut = async () => { await fbSignOut(auth); showLogin(); };
window.saveApiKey = () => {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k.startsWith('sk-ant-')) { alert('올바른 API 키를 입력하세요 (sk-ant-로 시작)'); return; }
  localStorage.setItem('eos_api_key', k);
  showApp();
};

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  ['api-screen','app-screen','task-screen'].forEach(id => document.getElementById(id).style.display = 'none');
}
function showApiScreen() {
  document.getElementById('api-screen').style.display = 'flex';
  ['login-screen','app-screen','task-screen'].forEach(id => document.getElementById(id).style.display = 'none');
}
window.showApp = () => {
  document.getElementById('app-screen').style.display = 'block';
  ['login-screen','api-screen','task-screen'].forEach(id => document.getElementById(id).style.display = 'none');
  renderTrack(currentTrack);
};
window.switchTrack = (track) => {
  currentTrack = track;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + track);
  if (nav) nav.classList.add('active');
  track === 'teacher' ? renderTeacher() : renderTrack(track);
};
window.switchTab = (tab) => {
  const isA = tab === 'article';
  document.getElementById('article-tab').style.display = isA ? 'block' : 'none';
  document.getElementById('task-tab').style.display    = isA ? 'none'  : 'block';
  document.getElementById('tab-article-btn').classList.toggle('active', isA);
  document.getElementById('tab-task-btn').classList.toggle('active', !isA);
};

async function loadProgress() {
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    if (snap.exists()) userProgress = snap.data().progress || {};
  } catch(e) { console.log('로드 실패:', e); }
}
async function saveProgress(track, week, answers, score, feedback) {
  const key = track + '_w' + week;
  userProgress[key] = { answers, score, feedback, submittedAt: new Date().toISOString() };
  try {
    await setDoc(doc(db, 'users', currentUser.uid), {
      name: currentUser.displayName, email: currentUser.email,
      progress: userProgress, updatedAt: new Date().toISOString()
    }, { merge: true });
  } catch(e) { console.log('저장 실패:', e); }
}

function renderTrack(track) {
  const data = CURRICULUM[track];
  document.getElementById('track-badge').textContent = data.title;
  const done = data.weeks.filter(w => userProgress[track + '_w' + w.week]).length;
  document.getElementById('main-content').innerHTML = `
    <h2>${data.title}</h2>
    <p class="sub">${data.subtitle}</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${data.weeks.length}</div><div class="stat-lbl">전체 주차</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#27500a">${done}</div><div class="stat-lbl">완료</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#c0392b">${data.weeks.length - done}</div><div class="stat-lbl">남은 주차</div></div>
    </div>
    <div class="week-list" id="week-list"></div>
  `;
  const list = document.getElementById('week-list');
  data.weeks.forEach((w, i) => {
    const key    = track + '_w' + w.week;
    const isDone = !!userProgress[key];
    const isOpen = !isDone && (i === 0 || !!userProgress[track + '_w' + data.weeks[i-1].week]);
    const score  = isDone ? userProgress[key].score : null;
    const numCls   = isDone ? 'wnum-done' : isOpen ? 'wnum-active' : 'wnum-lock';
    const badgeCls = isDone ? 'b-done'    : isOpen ? 'b-active'    : 'b-lock';
    const badgeTxt = isDone ? score + '점': isOpen ? '진행 중'      : '잠김';
    const card = document.createElement('div');
    card.className = 'week-card' + (isDone ? ' done' : '') + (isOpen ? ' active-week' : '');
    card.innerHTML = `
      <div class="wnum ${numCls}">${isDone ? '✓' : w.week}</div>
      <div class="winfo">
        <div class="wtitle">${w.week}주차 · ${w.title}</div>
        <div class="wmeta">롱블랙 · 문항 5개 · 20점 만점</div>
      </div>
      <span class="wbadge ${badgeCls}">${badgeTxt}</span>
    `;
    if (isDone || isOpen) card.onclick = () => openTask(track, w.week);
    list.appendChild(card);
  });
}

window.openTask = (track, week) => {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('task-screen').style.display = 'block';
  renderTaskScreen(track, week);
};

// ── 아티클 본문 렌더링 (가독성 개선) ────────────────────────────────────
function renderArticleContent(article, w) {
  if (!article || !article.content) {
    return `<div style="text-align:center;padding:3rem;color:#888">
      <p style="margin-bottom:1rem">아티클을 불러올 수 없어요</p>
      <a href="https://${w.url}" target="_blank" style="color:#1a6fab">→ 롱블랙에서 직접 읽기</a>
    </div>`;
  }

  const lines = article.content.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();

    // 빈 줄 스킵
    if (!line || line === '[]') { i++; continue; }

    // Chapter 제목
    const chapterMatch = line.match(/^Chapter\s+(\d+)[.\s]+(.*)/);
    if (chapterMatch) {
      html += `<div class="article-chapter">
        <div class="article-chapter-num">Chapter ${chapterMatch[1]}</div>
        <div class="article-chapter-title">${esc(chapterMatch[2].trim())}</div>
      </div>`;
      i++; continue;
    }

    // 인용문 (들여쓰기 2칸 이상)
    if (lines[i].startsWith('  ') && line) {
      let quoteLines = [];
      while (i < lines.length && lines[i].startsWith('  ') && lines[i].trim()) {
        quoteLines.push(lines[i].trim());
        i++;
      }
      const fullQuote = quoteLines.join(' ');
      // 출처 분리 (마지막 _로 시작하는 부분)
      const srcIdx = fullQuote.lastIndexOf('_');
      const quoteText = srcIdx > 0 ? fullQuote.substring(0, srcIdx).replace(/^["']|["']$/g, '').trim() : fullQuote;
      const quoteSrc  = srcIdx > 0 ? fullQuote.substring(srcIdx + 1).trim() : '';
      html += `<div class="article-quote">
        <div class="article-quote-text">"${esc(quoteText)}"</div>
        ${quoteSrc ? `<div class="article-quote-source">— ${esc(quoteSrc)}</div>` : ''}
      </div>`;
      continue;
    }

    // 구분선 역할 (짧은 줄 + 아이콘처럼 보이는 것)
    if (line.length < 5 && i > 0) { i++; continue; }

    // 요약 섹션 감지 (오늘 노트를 요약 / 요약 패턴)
    if (line.includes('요약') && line.length < 30) {
      html += `<hr class="article-divider">
        <div class="article-summary">
          <div class="article-summary-title">📌 핵심 요약</div>
          <ul class="article-summary">`;
      i++;
      while (i < lines.length && lines[i].trim()) {
        const sl = lines[i].trim();
        if (sl.match(/^\d+\./)) {
          html += `<li>${esc(sl.replace(/^\d+\.\s*/, ''))}</li>`;
        }
        i++;
      }
      html += '</ul></div>';
      continue;
    }

    // 일반 단락 — 연속 줄 합치기
    let paraLines = [];
    while (i < lines.length && lines[i].trim() &&
           !lines[i].startsWith('  ') &&
           !lines[i].trim().match(/^Chapter\s+\d+/)) {
      const t = lines[i].trim();
      if (t && t !== '[]' && !t.startsWith('![')) paraLines.push(t);
      i++;
    }
    if (paraLines.length) {
      html += `<p class="article-para">${esc(paraLines.join(' '))}</p>`;
    }
  }

  return html;
}

function esc(str) {
  return (str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function renderTaskScreen(track, week) {
  const data   = CURRICULUM[track];
  const w      = data.weeks.find(x => x.week === week);
  const saved  = userProgress[track + '_w' + week];
  const noteId = w.url.split('/').pop();
  const article= (typeof ARTICLES !== 'undefined') ? ARTICLES[noteId] : null;

  document.getElementById('task-title').textContent = week + '주차 · ' + w.title;
  switchTab('article');

  // 아티클 탭
  const trackLabel = { branding1:'브랜딩 1학기', branding2:'브랜딩 2학기', trend1:'트렌드 1학기', trend2:'트렌드 2학기' }[track] || '';
  document.getElementById('article-tab').innerHTML = `
    <div class="article-wrap">
      <div class="article-hero">
        <div class="article-hero-badge">${trackLabel} · ${week}주차</div>
        <div class="article-hero-title">${esc(article ? article.title : w.title)}</div>
        <a href="https://${w.url}" target="_blank" class="article-hero-link">→ 롱블랙 원문 보기</a>
      </div>
      <div class="article-body-wrap">
        ${renderArticleContent(article, w)}
      </div>
    </div>
  `;

  // 과제 탭
  const resultHtml = saved && saved.feedback ? `
    <div class="result-box">
      <div class="result-title">📊 채점 결과</div>
      <div class="score-grid">
        <div class="score-card"><div class="score-num">${saved.score}</div><div class="score-lbl">총점 / 20</div></div>
        <div class="score-card"><div class="score-num">${saved.feedback.understanding||'-'}</div><div class="score-lbl">이해 / 12</div></div>
        <div class="score-card"><div class="score-num">${saved.feedback.critical||'-'}</div><div class="score-lbl">심화 / 8</div></div>
      </div>
      ${(saved.feedback.items||[]).map(item => `
        <div class="fb-item fb-${item.level}">
          <div class="fb-q">${item.q}</div>
          <div class="fb-score" style="color:${item.level==='good'?'#27500a':item.level==='avg'?'#854f0b':'#c0392b'}">${item.score}점</div>
          <div class="fb-text">${item.text}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  document.getElementById('task-tab').innerHTML = `
    ${resultHtml}
    <div class="q-section">
      <div class="q-section-title">✏️ 이해 확인 문제 (Q1–Q3) — 각 4점</div>
      ${w.questions.slice(0,3).map(q => `
        <div class="q-box">
          <div class="q-label">${q.label}</div>
          <div class="q-text">${q.text}</div>
          <textarea class="q-textarea" id="ans_${q.id}" placeholder="여기에 답변을 작성하세요...">${saved?(saved.answers[q.id]||''):''}</textarea>
        </div>
      `).join('')}
    </div>
    <div class="q-section">
      <div class="q-section-title">🧠 심화 사고 문제 (Q4–Q5) — 각 4점</div>
      ${w.questions.slice(3).map(q => `
        <div class="q-box">
          <div class="q-label">${q.label}</div>
          <div class="q-text">${q.text}</div>
          <textarea class="q-textarea" id="ans_${q.id}" placeholder="여기에 답변을 작성하세요...">${saved?(saved.answers[q.id]||''):''}</textarea>
        </div>
      `).join('')}
    </div>
    <div class="submit-area" id="submit-area">
      <button class="btn-submit" id="submit-btn" onclick="submitTask('${track}', ${week})">
        ${saved ? '다시 제출하기' : 'AI 채점 요청'}
      </button>
      <p style="margin-top:.8rem;font-size:.8rem;color:#888">아티클을 읽고 답변 작성 후 제출하면 Claude AI가 채점해드려요</p>
    </div>
  `;
}

window.submitTask = async (track, week) => {
  const data = CURRICULUM[track];
  const w    = data.weeks.find(x => x.week === week);
  const btn  = document.getElementById('submit-btn');
  const answers = {};
  let allFilled = true;
  w.questions.forEach(q => {
    const val = (document.getElementById('ans_' + q.id)?.value || '').trim();
    answers[q.id] = val;
    if (!val) allFilled = false;
  });
  if (!allFilled) { alert('모든 문항을 작성해주세요.'); return; }
  btn.disabled = true; btn.textContent = '채점 중...';
  document.getElementById('submit-area').insertAdjacentHTML('afterbegin',
    '<div class="loading" id="loading-msg"><span class="spinner"></span>Claude AI가 채점 중이에요...</div>');

  const apiKey = localStorage.getItem('eos_api_key');
  const prompt = `당신은 EOS 학교 커리큘럼의 채점 AI입니다. 아래 과제를 루브릭에 따라 채점하고 JSON으로만 응답하세요.

아티클: ${w.title} (${data.title})
${w.questions.map(q => `[${q.label}] ${q.text}\n답변: ${answers[q.id]}`).join('\n\n')}

채점 기준(각 4점): 4=핵심 정확히 파악+구체적 서술 / 3=맞으나 표면적 / 2=부분적 / 1=논리부족 / 0=무응답
Q1~Q3 이해확인(최대12점), Q4~Q5 심화사고(최대8점)

JSON만 응답:
{"total":숫자,"understanding":숫자,"critical":숫자,"items":[{"q":"Q1 사실 확인","score":숫자,"level":"good|avg|poor","text":"피드백"},{"q":"Q2 인과 관계","score":숫자,"level":"good|avg|poor","text":"피드백"},{"q":"Q3 핵심 파악","score":숫자,"level":"good|avg|poor","text":"피드백"},{"q":"Q4 비판적 사고","score":숫자,"level":"good|avg|poor","text":"피드백"},{"q":"Q5 전공 연결","score":숫자,"level":"good|avg|poor","text":"피드백"}]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const data2 = await res.json();
    if (data2.error) throw new Error(data2.error.message);
    const fb = JSON.parse(data2.content[0].text.replace(/```json|```/g,'').trim());
    fb.items.forEach(item => { item.level = item.score >= 3 ? 'good' : item.score >= 2 ? 'avg' : 'poor'; });
    await saveProgress(track, week, answers, fb.total, fb);
    renderTaskScreen(track, week);
    switchTab('task');
  } catch(e) {
    document.getElementById('loading-msg')?.remove();
    btn.disabled = false; btn.textContent = 'AI 채점 요청';
    alert('채점 중 오류가 발생했어요: ' + e.message);
  }
};

async function renderTeacher() {
  if (!isTeacher) { alert('교사 전용 화면입니다.'); return; }
  document.getElementById('track-badge').textContent = '교사 현황판';
  document.getElementById('main-content').innerHTML = '<div class="loading"><span class="spinner"></span>데이터 불러오는 중...</div>';
  try {
    const snap = await getDocs(collection(db, 'users'));
    const students = [];
    snap.forEach(d => { if (!TEACHER_EMAILS.includes(d.data().email)) students.push(d.data()); });
    const avgDone     = students.length ? Math.round(students.reduce((s,st)=>s+Object.keys(st.progress||{}).length,0)/students.length) : 0;
    const totalSubmit = students.reduce((s,st)=>s+Object.keys(st.progress||{}).length,0);
    const avgScore    = students.length ? Math.round(students.reduce((s,st)=>{ const sc=Object.values(st.progress||{}).map(p=>p.score||0); return s+(sc.length?sc.reduce((a,b)=>a+b,0)/sc.length:0); },0)/students.length) : 0;
    document.getElementById('main-content').innerHTML = `
      <h2>교사 현황판</h2>
      <p class="sub">전체 학생 진도 및 채점 현황</p>
      <div class="teacher-grid">
        <div class="stat-card"><div class="stat-num">${students.length}</div><div class="stat-lbl">전체 학생</div></div>
        <div class="stat-card"><div class="stat-num">${avgDone}</div><div class="stat-lbl">평균 완료 주차</div></div>
        <div class="stat-card"><div class="stat-num">${totalSubmit}</div><div class="stat-lbl">총 제출 수</div></div>
        <div class="stat-card"><div class="stat-num">${avgScore}점</div><div class="stat-lbl">평균 점수</div></div>
      </div>
      <div class="student-table">
        <table>
          <thead><tr><th>학생</th><th>이메일</th><th>완료 주차</th><th>평균 점수</th><th>마지막 제출</th></tr></thead>
          <tbody>
            ${students.sort((a,b)=>Object.keys(b.progress||{}).length-Object.keys(a.progress||{}).length).map(st=>{
              const prog=st.progress||{}, keys=Object.keys(prog);
              const scores=keys.map(k=>prog[k].score||0);
              const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):'-';
              const last=keys.length?new Date(prog[keys[keys.length-1]].submittedAt).toLocaleDateString('ko-KR'):'-';
              return `<tr><td>${st.name||'이름 없음'}</td><td style="font-size:.8rem;color:#888">${st.email}</td><td>${keys.length}/80</td><td>${avg!=='-'?avg+'점':'-'}</td><td>${last}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<p style="padding:2rem;color:#c0392b">데이터 로드 실패: ${e.message}</p>`;
  }
}
